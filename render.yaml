services:
  - type: web
    name: intellisql-backend
    env: python
    rootDir: "Project Files/backend"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: "https://openrouter.ai/api/v1"
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: "HS256"
      - key: JWT_EXPIRATION_MINUTES
        value: "1440"
      - key: CORS_ORIGINS
        sync: false
